name: .NET CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Restore Dependencies
      run: dotnet restore CommitLens.slnx
    - name: Build Solution
      run: dotnet build CommitLens.slnx --no-restore --configuration Release
    - name: Run Tests
      run: dotnet test CommitLens.slnx --no-build --configuration Release --verbosity normal
